<!-- 計測（強化版） -->
<script>
window.dataLayer = window.dataLayer || [];

// デバイス判定
function device(){
  if(/Mobi|Android|iPhone/.test(navigator.userAgent)) return 'mobile';
  if(/iPad|Tablet/.test(navigator.userAgent)) return 'tablet';
  return 'desktop';
}

// スクロール率取得
function getScrollDepth(){
  const scrollTop = window.scrollY;
  const docHeight = document.body.scrollHeight - window.innerHeight;
  return docHeight > 0 ? Math.round((scrollTop / docHeight) * 100) : 0;
}

// 画面サイズ
function getViewport(){
  return window.innerWidth + "x" + window.innerHeight;
}

// クリック計測
document.querySelectorAll('.cta-track').forEach(btn=>{
  btn.addEventListener('click', ()=>{

    window.dataLayer.push({
      event: 'cta_click',

      // 既存
      cta_location: btn.dataset.location,
      cta_section: btn.dataset.section,
      cta_type: btn.dataset.type,
      page_type: btn.dataset.page,
      cta_id: btn.dataset.id,

      // 強化
      device_category: device(),
      cta_text: btn.innerText,
      cta_url: btn.href,

      scroll_depth: getScrollDepth(),
      viewport: getViewport(),
      page_url: location.href,
      referrer: document.referrer,
      click_time: new Date().toISOString()
    });

  });
});
</script>
