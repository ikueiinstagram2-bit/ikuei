<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>育英センター｜無料体験受付中</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Noto Sans JP',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

section{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:80px 20px;
  background-size:cover;
  background-position:center;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.content{
  position:relative;
  z-index:2;
  max-width:900px;
}

h1{font-size:3rem;font-weight:800;}
h2{font-size:2.3rem;color:#ffe600;font-weight:800;}
p,li{font-size:1.5rem;line-height:1.8;}

.cta-bar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  gap:8px;
  padding:10px;
  background:rgba(0,0,0,0.92);
  z-index:9999;
}

.cta-btn{
  flex:1;
  padding:16px;
  font-size:1.1rem;
  font-weight:800;
  color:#fff;
  text-align:center;
  border-radius:10px;
  background:linear-gradient(45deg,#ff6600,#ffcc00);
  text-decoration:none;
}

/* ▼ 動画 */
.video-thumb{
  position:relative;
  cursor:pointer;
}

.video-thumb img{
  width:100%;
  border-radius:12px;
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
}

/* レスポンシブ */
@media(max-width:768px){
  h1{font-size:2rem;}
  h2{font-size:1.6rem;}
  p,li{font-size:1.2rem;}
  .cta-bar{flex-direction:column;}
}
</style>
</head>

<body>

<!-- FV -->
<section data-bg="https://images.pexels.com/photos/32279010/pexels-photo-32279010.jpeg">
<div class="overlay"></div>
<div class="content">
<h1>平均30点 → 80点へ<br>最短1ヶ月で成績アップ</h1>
<p>富山・石川・福井｜無料体験受付中</p>
</div>
</section>

<!-- problem -->
<section data-bg="https://images.pexels.com/photos/35769752/pexels-photo-35769752.jpeg">
<div class="overlay"></div>
<div class="content">
<h2>こんな悩みありませんか？</h2>
<p>勉強方法がわからない / 点数が上がらない / 続かない</p>
</div>
</section>

<!-- solution -->
<section data-bg="https://images.pexels.com/photos/33846282/pexels-photo-33846282.jpeg">
<div class="overlay"></div>
<div class="content">
<h2>育英センターの解決法</h2>
<p>やり方から徹底指導・質問し放題・習慣化</p>
</div>
</section>

<!-- result -->
<section data-bg="https://images.pexels.com/photos/31861700/pexels-photo-31861700.jpeg">
<div class="overlay"></div>
<div class="content">
<h2>成績アップ実績</h2>
<p>30点 → 82点 / 40点 → 78点</p>
</div>
</section>

<!-- video（改善版） -->
<section data-bg="https://images.pexels.com/photos/4144222/pexels-photo-4144222.jpeg">
<div class="overlay"></div>
<div class="content">
<h2>授業イメージ（1分）</h2>

<div class="video-thumb" id="video">
<img src="https://img.youtube.com/vi/ScMzIvxBSi4/hqdefault.jpg">
<div class="play-btn">▶</div>
</div>

</div>
</section>

<!-- CTA -->
<div class="cta-bar">
<a href="#" class="cta-btn">富山</a>
<a href="#" class="cta-btn">金沢</a>
<a href="#" class="cta-btn">福井</a>
</div>

<script>
/* ======================
  ① 背景画像遅延読み込み
====================== */
const sections = document.querySelectorAll("section");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      const el = entry.target;
      el.style.backgroundImage = `url(${el.dataset.bg})`;
      observer.unobserve(el);
    }
  });
});

sections.forEach(sec=>observer.observe(sec));

/* ======================
  ② 動画クリックで読み込み
====================== */
document.getElementById("video").addEventListener("click",function(){
  this.innerHTML = `
    <iframe width="100%" height="450"
    src="https://www.youtube.com/embed/ScMzIvxBSi4?autoplay=1"
    frameborder="0" allowfullscreen></iframe>
  `;
});

/* ======================
  ③ 軽量トラッキング
====================== */
function device(){
  return window.innerWidth < 768 ? "mobile" : "desktop";
}

document.querySelectorAll(".cta-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    console.log({
      event:"cta_click",
      device:device()
    });
  });
});
</script>

</body>
</html>
